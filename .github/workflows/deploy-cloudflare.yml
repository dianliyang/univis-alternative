name: Deploy Cloudflare

on:
  workflow_dispatch:
    inputs:
      fresh_crawl:
        description: Run a fresh UnivIS crawl before building
        required: false
        default: "false"
      force_tree_refresh:
        description: Force a full tree refresh during build
        required: false
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      UNIVIS_TREE_CONCURRENCY: "1"
      UNIVIS_FORCE_TREE_REFRESH: ${{ inputs.force_tree_refresh == 'true' && '1' || '0' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore UnivIS data cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/discovery
            data/raw
            data/normalized
          key: univis-data-${{ runner.os }}-v1

      - name: Fetch fresh UnivIS data
        if: ${{ inputs.fresh_crawl == 'true' }}
        run: npm run fetch:data

      - name: Build Cloudflare artifacts
        run: npm run cf:build

      - name: Publish public data to R2
        run: npm run cf:publish-data

      - name: Deploy Worker
        run: npm run cf:deploy

      - name: Save UnivIS data cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            data/discovery
            data/raw
            data/normalized
          key: univis-data-${{ runner.os }}-v1
