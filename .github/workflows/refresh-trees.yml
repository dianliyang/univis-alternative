name: Refresh Trees

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      UNIVIS_TREE_CONCURRENCY: "1"
      UNIVIS_FORCE_TREE_REFRESH: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Restore UnivIS data cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/discovery
            data/raw
            data/normalized
          key: univis-data-${{ runner.os }}-v1

      - name: Install dependencies
        run: npm ci

      - name: Refresh tree artifacts
        run: npm run prepare:trees

      - name: Save UnivIS data cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            data/discovery
            data/raw
            data/normalized
          key: univis-data-${{ runner.os }}-v1
