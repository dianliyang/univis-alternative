name: Refresh Trees

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      UNIVIS_TREE_CONCURRENCY: "8"
      UNIVIS_FORCE_TREE_REFRESH: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Restore UnivIS data cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/discovery
            data/raw
            data/normalized
          key: univis-data-${{ runner.os }}-v1

      - name: Start phase timer
        run: echo "WORKFLOW_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Refresh tree artifacts
        run: |
          phase_start=$(date +%s)
          npm run prepare:trees
          phase_end=$(date +%s)
          echo "TREE_REFRESH_SECONDS=$((phase_end - phase_start))" >> "$GITHUB_ENV"

      - name: Save UnivIS data cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            data/discovery
            data/raw
            data/normalized
          key: univis-data-${{ runner.os }}-v1

      - name: Phase timing summary
        if: always()
        run: |
          workflow_end=$(date +%s)
          total_seconds=$((workflow_end - WORKFLOW_START))
          echo "Phase timing summary"
          echo "tree_refresh=${TREE_REFRESH_SECONDS:-0}s"
          echo "total=${total_seconds}s"
